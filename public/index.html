<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Enterprise Trial Survey | Audio/Video Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --dispatch-blue: #4a6da7;
    --dispatch-blue-dark: #3a5a8f;
    --dispatch-blue-light: #6b8ec4;
    --dispatch-blue-pale: #e8eef6;
    --dispatch-blue-ghost: #f4f7fb;
    --dispatch-blue-10: rgba(74, 109, 167, 0.10);
    --dispatch-blue-05: rgba(74, 109, 167, 0.05);
    --parchment: #f5f0e8;
    --parchment-warm: #ede6d8;
    --parchment-light: #faf8f3;
    --parchment-dark: #ddd5c4;
    --ink: #1a1a2e;
    --ink-soft: #2d2d42;
    --ink-muted: #6b6b80;
    --ink-faint: #9e9eb0;
    --white: #ffffff;
    --success: #3a9e6e;
    --warning: #d4953a;
    --error: #c74b4b;
    --font-display: 'Plus Jakarta Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 16px;
    --radius-sm: 10px;
    --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-display);
    background: var(--parchment-light);
    color: var(--ink);
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .survey-container {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .bg-pattern {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.03;
    background-image:
      radial-gradient(ellipse 600px 400px at 20% 30%, var(--dispatch-blue), transparent),
      radial-gradient(ellipse 500px 300px at 80% 70%, var(--dispatch-blue-light), transparent);
    animation: patternDrift 20s ease-in-out infinite alternate;
  }

  @keyframes patternDrift {
    0% { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.1) translate(-2%, 3%); }
  }

  .survey-header {
    background: rgba(250, 248, 243, 0.88);
    backdrop-filter: blur(20px) saturate(1.3);
    border-bottom: 1px solid var(--parchment-dark);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    position: relative;
  }

  .survey-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .survey-brand-icon {
    width: 36px;
    height: 36px;
    background: var(--dispatch-blue);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.5px;
  }

  .survey-brand-text {
    font-size: 14px;
    font-weight: 800;
    color: var(--dispatch-blue);
    letter-spacing: -0.3px;
  }

  .survey-brand-text span {
    font-weight: 400;
    color: var(--ink-muted);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-bar {
    height: 3px;
    background: var(--parchment-dark);
    position: relative;
    flex-shrink: 0;
    z-index: 10;
  }

  .progress-fill {
    height: 100%;
    background: var(--dispatch-blue);
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    border-radius: 0 2px 2px 0;
  }

  .progress-text {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--ink-faint);
  }

  .slides-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    opacity: 0;
    transform: translateY(40px);
    pointer-events: none;
    transition: opacity var(--transition), transform var(--transition);
  }

  .slide.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .slide.exit-up {
    opacity: 0;
    transform: translateY(-40px);
  }

  .slide-content {
    max-width: 640px;
    width: 100%;
  }

  .slide-card {
    background: var(--white);
    border: 1px solid var(--parchment-dark);
    border-radius: var(--radius);
    padding: 40px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s;
  }

  .slide-card:hover {
    box-shadow: 0 8px 30px rgba(74, 109, 167, 0.06);
  }

  .slide-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--dispatch-blue);
    opacity: 0.6;
  }

  .welcome-card {
    text-align: center;
    padding: 56px 40px;
  }

  .welcome-card::before {
    height: 4px;
    opacity: 1;
  }

  .slide-number {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--dispatch-blue);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 20px;
    padding: 4px 12px;
    background: var(--dispatch-blue-10);
    border-radius: 999px;
  }

  .slide-number .arrow { font-size: 14px; }

  h1 {
    font-size: 26px;
    font-weight: 800;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 12px;
    letter-spacing: -1px;
  }

  h1.hero {
    font-size: 34px;
    color: var(--dispatch-blue);
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }

  .slide-description {
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink-muted);
    margin-bottom: 28px;
  }

  .welcome-visual {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    border-radius: 16px;
    background: var(--dispatch-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    animation: floatIcon 3s ease-in-out infinite;
  }

  @keyframes floatIcon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .welcome-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--parchment-dark);
  }

  .welcome-stat { text-align: center; }

  .welcome-stat-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .welcome-stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .option-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid var(--parchment-dark);
    border-radius: 12px;
    background: var(--parchment-light);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    text-align: left;
    font-size: 15px;
    font-family: var(--font-display);
    color: var(--ink-soft);
    width: 100%;
  }

  .option-btn:hover {
    border-color: var(--dispatch-blue-light);
    background: var(--dispatch-blue-05);
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--dispatch-blue);
    background: var(--dispatch-blue-10);
    box-shadow: 0 0 0 1px var(--dispatch-blue);
    color: var(--ink);
  }

  .option-btn .key {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--white);
    border: 1.5px solid var(--parchment-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--dispatch-blue);
    flex-shrink: 0;
    transition: all 0.25s;
  }

  .option-btn.selected .key {
    background: var(--dispatch-blue);
    border-color: var(--dispatch-blue);
    color: white;
  }

  .option-btn .check-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1.5px solid var(--parchment-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    font-size: 14px;
    color: transparent;
  }

  .option-btn.selected .check-icon {
    background: var(--dispatch-blue);
    border-color: var(--dispatch-blue);
    color: white;
  }

  .text-input {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid var(--parchment-dark);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: var(--font-display);
    color: var(--ink);
    background: var(--white);
    resize: vertical;
    min-height: 120px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .text-input:focus {
    border-color: var(--dispatch-blue);
    box-shadow: 0 0 0 3px var(--dispatch-blue-10);
  }

  .text-input::placeholder { color: var(--ink-faint); }

  .name-input {
    min-height: auto;
    height: auto;
    padding: 14px 18px;
  }

  .rating-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .rating-btn {
    width: 52px;
    height: 52px;
    border: 1.5px solid var(--parchment-dark);
    border-radius: 12px;
    background: var(--white);
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--font-display);
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .rating-btn:hover {
    border-color: var(--dispatch-blue-light);
    color: var(--dispatch-blue);
    transform: scale(1.08);
    box-shadow: 0 4px 12px rgba(74, 109, 167, 0.1);
  }

  .rating-btn.selected {
    border-color: var(--dispatch-blue);
    background: var(--dispatch-blue);
    color: white;
    box-shadow: 0 4px 16px rgba(74, 109, 167, 0.25);
    transform: scale(1.05);
  }

  .rating-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 500;
  }

  .nav-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-display);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    border: none;
  }

  .btn-primary {
    background: var(--dispatch-blue);
    color: white;
  }

  .btn-primary:hover {
    background: var(--dispatch-blue-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(74, 109, 167, 0.25);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    color: var(--ink-muted);
    border: 1.5px solid var(--parchment-dark);
  }

  .btn-secondary:hover { background: var(--parchment); color: var(--ink-soft); }

  .btn-large {
    padding: 16px 36px;
    font-size: 16px;
  }

  .hint {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 12px;
  }

  .hint kbd {
    display: inline-block;
    padding: 2px 8px;
    background: var(--parchment);
    border: 1px solid var(--parchment-dark);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-muted);
  }

  .welcome-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--dispatch-blue-10);
    border: 1px solid rgba(74, 109, 167, 0.15);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dispatch-blue);
    margin-bottom: 20px;
  }

  .thankyou-card {
    text-align: center;
    padding: 56px 40px;
  }

  .thankyou-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--dispatch-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 24px;
    color: white;
    animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes scaleIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .required-star { color: var(--error); }

  .validation-msg {
    font-size: 13px;
    color: var(--error);
    margin-top: 8px;
    display: none;
    animation: shake 0.4s ease;
  }

  .validation-msg.show { display: block; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  .slide-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 12px;
  }

  .keyboard-hint {
    font-size: 11px;
    color: var(--ink-faint);
    opacity: 0.7;
  }

  @media (max-width: 680px) {
    h1 { font-size: 22px; }
    h1.hero { font-size: 26px; }
    .slide { padding: 16px; }
    .slide-card { padding: 28px 20px; }
    .welcome-card { padding: 36px 20px; }
    .slide-description { font-size: 14px; }
    .rating-btn { width: 44px; height: 44px; font-size: 16px; }
    .survey-header { padding: 12px 16px; }
    .welcome-stats { gap: 20px; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="survey-container" id="app">
  <header class="survey-header">
    <div class="survey-brand">
      <div class="survey-brand-icon">AV</div>
      <span class="survey-brand-text">AV AI Dispatch <span>/ Gemini Trial Feedback</span></span>
    </div>
    <div class="header-actions">
      <span class="progress-text" id="progressText"></span>
    </div>
  </header>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div class="slides-viewport" id="slidesViewport"></div>
</div>

<script>
(function() {
  'use strict';

  const API_ENDPOINT = '/api/submit';

  let currentSlide = 0;
  let answers = {};
  let branch = 'user';
  let isTransitioning = false;

  function getSlides() {
    const base = [
      {
        id: 'welcome',
        type: 'welcome',
        heading: 'Tell Us About Your Gemini Experience',
        description: 'This short survey helps Audio/Video Services understand how the Google Gemini Enterprise trial is going. Whether you used it daily or never got around to it, we want to hear from you. Your responses will help us get the most use out of these tools.',
        badge: 'Gemini Enterprise Trial',
        buttonText: 'Let\'s Get Started',
      },
      {
        id: 'name',
        type: 'text-short',
        number: 1,
        heading: 'First, who\'s sharing their experience today?',
        description: 'Feel free to share your name, or leave this blank to stay anonymous. Either way, your feedback is valued.',
        placeholder: 'Your name (optional)',
        field: 'respondentName',
        required: false,
      },
      {
        id: 'didUse',
        type: 'single-select',
        number: 2,
        heading: 'Did you use Google Gemini during the trial period?',
        description: 'Be honest \u2014 there\'s no wrong answer here. We\'re just as interested in why some people didn\'t use it as how others did.',
        field: 'didUseGemini',
        required: true,
        options: [
          { key: 'A', value: 'yes', label: 'Yes, I used it' },
          { key: 'B', value: 'no', label: 'No, I didn\'t end up using it' },
        ],
      },
    ];

    const nonUserBranch = [
      {
        id: 'whyNot',
        type: 'multi-select',
        number: 3,
        heading: 'What kept you from trying Gemini?',
        description: 'Select all that apply. Understanding the barriers helps us improve for everyone.',
        field: 'reasonsNotUsed',
        required: true,
        options: [
          { value: 'no-time', label: 'I didn\'t have time to explore it' },
          { value: 'no-need', label: 'I didn\'t see how it applied to my work' },
          { value: 'unsure-how', label: 'I wasn\'t sure how to get started' },
          { value: 'access-issues', label: 'I had trouble accessing it' },
          { value: 'prefer-existing', label: 'I prefer the tools I already use' },
          { value: 'uncomfortable', label: 'I\'m not comfortable with AI tools' },
          { value: 'forgot', label: 'I meant to but it slipped my mind' },
          { value: 'other', label: 'Other reason' },
        ],
      },
      {
        id: 'whatWouldHelp',
        type: 'textarea',
        number: 4,
        heading: 'What would have made it easier for you to try Gemini?',
        description: 'More training? A specific use case for your role? Anything you can share helps us plan better.',
        placeholder: 'Share your thoughts here...',
        field: 'whatWouldHelp',
        required: false,
      },
      {
        id: 'openToTrying',
        type: 'single-select',
        number: 5,
        heading: 'Would you be open to trying Gemini if given more support or guidance?',
        field: 'openToTrying',
        required: true,
        options: [
          { key: 'A', value: 'yes-definitely', label: 'Yes, definitely' },
          { key: 'B', value: 'yes-maybe', label: 'Maybe, with the right support' },
          { key: 'C', value: 'not-sure', label: 'I\'m not sure' },
          { key: 'D', value: 'no', label: 'Probably not' },
        ],
      },
    ];

    const userBranch = [
      {
        id: 'frequency',
        type: 'single-select',
        number: 3,
        heading: 'How often did you use Gemini during the trial?',
        field: 'usageFrequency',
        required: true,
        options: [
          { key: 'A', value: 'daily', label: 'Daily or almost daily' },
          { key: 'B', value: 'few-per-week', label: 'A few times a week' },
          { key: 'C', value: 'once-per-week', label: 'About once a week' },
          { key: 'D', value: 'few-times', label: 'Just a few times total' },
          { key: 'E', value: 'once', label: 'I tried it once' },
        ],
      },
      {
        id: 'features',
        type: 'multi-select',
        number: 4,
        heading: 'Which Gemini features did you use?',
        description: 'Select all that you tried, even if just briefly.',
        field: 'featuresUsed',
        required: true,
        options: [
          { value: 'chat', label: 'Chat conversations (general prompting)' },
          { value: 'deep-research', label: 'Deep Research' },
          { value: 'notebooklm', label: 'NotebookLM (research notebooks)' },
          { value: 'image-gen', label: 'Image generation' },
          { value: 'video-gen', label: 'Video generation (Veo)' },
          { value: 'file-analysis', label: 'File upload & analysis' },
          { value: 'google-search', label: 'Google Search connector' },
        ],
      },
      {
        id: 'usedFor',
        type: 'textarea',
        number: 5,
        heading: 'What work tasks did you use Gemini for?',
        description: 'Describe what you tried to accomplish. Specific examples help us understand real use cases in AV Services.',
        placeholder: 'For example: "I used it to draft project summaries" or "I uploaded meeting notes to NotebookLM to find key decisions"...',
        field: 'workTasks',
        required: true,
      },
      {
        id: 'liked',
        type: 'textarea',
        number: 6,
        heading: 'What did you like most about Gemini?',
        description: 'What worked well? What surprised you? What would you want to keep?',
        placeholder: 'Share what stood out to you...',
        field: 'whatLiked',
        required: false,
      },
      {
        id: 'disliked',
        type: 'textarea',
        number: 7,
        heading: 'What didn\'t work well or frustrated you?',
        description: 'No tool is perfect. Your honest feedback helps us advocate for improvements and better training.',
        placeholder: 'What was confusing, slow, inaccurate, or just not useful...',
        field: 'whatDisliked',
        required: false,
      },
      {
        id: 'rating',
        type: 'rating',
        number: 8,
        heading: 'Overall, how would you rate your Gemini experience?',
        description: '1 being very poor, 10 being excellent.',
        field: 'overallRating',
        required: true,
        min: 1,
        max: 10,
      },
      {
        id: 'continueUsing',
        type: 'single-select',
        number: 9,
        heading: 'Would you want to continue using Gemini after the trial?',
        field: 'continueUsing',
        required: true,
        options: [
          { key: 'A', value: 'yes-essential', label: 'Yes, it\'s become essential to my work' },
          { key: 'B', value: 'yes-helpful', label: 'Yes, it\'s helpful but not critical' },
          { key: 'C', value: 'maybe', label: 'Maybe, with improvements' },
          { key: 'D', value: 'indifferent', label: 'I could take it or leave it' },
          { key: 'E', value: 'no', label: 'No, I don\'t think I need it' },
        ],
      },
    ];

    const closing = [
      {
        id: 'additionalThoughts',
        type: 'textarea',
        number: branch === 'nonuser' ? 6 : 10,
        heading: 'Anything else you\'d like to share?',
        description: 'Any other thoughts, suggestions, or ideas about AI tools for our department.',
        placeholder: 'Optional \u2014 feel free to leave blank or share your heart...',
        field: 'additionalThoughts',
        required: false,
      },
      {
        id: 'thankyou',
        type: 'thankyou',
        heading: 'Thank you for sharing your experience!',
        description: 'Your feedback goes directly toward helping Audio/Video Services make informed decisions about tools like Gemini. We appreciate you taking the time.',
      },
    ];

    const mid = branch === 'nonuser' ? nonUserBranch : userBranch;
    return [...base, ...mid, ...closing];
  }

  let slides = getSlides();

  function renderSlide(slide, index) {
    const el = document.createElement('div');
    el.className = 'slide' + (index === currentSlide ? ' active' : '');
    el.dataset.index = index;

    let inner = '<div class="slide-content">';

    if (slide.type === 'welcome') {
      inner += '<div class="slide-card welcome-card">';
      inner += '<div class="welcome-visual">&#9881;</div>';
      inner += `<div class="welcome-badge">&#9733; ${slide.badge}</div>`;
      inner += `<h1 class="hero">${slide.heading}</h1>`;
      inner += `<p class="slide-description">${slide.description}</p>`;
      inner += `<button class="btn btn-primary btn-large" onclick="Survey.next()">${slide.buttonText} &rarr;</button>`;
      inner += '<div class="welcome-stats">';
      inner += '<div class="welcome-stat"><div class="welcome-stat-value">~5 min</div><div class="welcome-stat-label">to complete</div></div>';
      inner += '<div class="welcome-stat"><div class="welcome-stat-value">10</div><div class="welcome-stat-label">questions max</div></div>';
      inner += '<div class="welcome-stat"><div class="welcome-stat-value">100%</div><div class="welcome-stat-label">anonymous-friendly</div></div>';
      inner += '</div>';
      inner += '</div>';

    } else if (slide.type === 'thankyou') {
      inner += '<div class="slide-card thankyou-card">';
      inner += '<div class="thankyou-icon">&#10003;</div>';
      inner += `<h1>${slide.heading}</h1>`;
      inner += `<p class="slide-description">${slide.description}</p>`;
      inner += '</div>';

    } else {
      inner += '<div class="slide-card">';
      if (slide.number) {
        inner += `<div class="slide-number"><span class="arrow">&rarr;</span> Question ${slide.number}</div>`;
      }
      inner += `<h1>${slide.heading}${slide.required ? ' <span class="required-star">*</span>' : ''}</h1>`;
      if (slide.description) {
        inner += `<p class="slide-description">${slide.description}</p>`;
      }

      if (slide.type === 'single-select') {
        inner += '<div class="option-grid">';
        slide.options.forEach(opt => {
          const selected = answers[slide.field] === opt.value ? ' selected' : '';
          inner += `<button class="option-btn${selected}" data-field="${slide.field}" data-value="${opt.value}" onclick="Survey.selectSingle(this)">
            <span class="key">${opt.key}</span>
            <span>${opt.label}</span>
          </button>`;
        });
        inner += '</div>';
        inner += `<div class="validation-msg" id="val-${slide.id}">Please select an option to continue.</div>`;

      } else if (slide.type === 'multi-select') {
        inner += '<div class="option-grid">';
        const current = answers[slide.field] || [];
        slide.options.forEach(opt => {
          const selected = current.includes(opt.value) ? ' selected' : '';
          inner += `<button class="option-btn${selected}" data-field="${slide.field}" data-value="${opt.value}" onclick="Survey.toggleMulti(this)">
            <span class="check-icon">&#10003;</span>
            <span>${opt.label}</span>
          </button>`;
        });
        inner += '</div>';
        inner += `<p class="hint">Select all that apply, then press <kbd>OK</kbd> to continue.</p>`;
        inner += `<div class="validation-msg" id="val-${slide.id}">Please select at least one option.</div>`;
        inner += `<div class="nav-row">
          <button class="btn btn-primary" onclick="Survey.next()">OK &check;</button>
        </div>`;

      } else if (slide.type === 'textarea') {
        const val = answers[slide.field] || '';
        inner += `<textarea class="text-input" data-field="${slide.field}" placeholder="${slide.placeholder || ''}" oninput="Survey.textInput(this)">${val}</textarea>`;
        if (slide.required) {
          inner += `<div class="validation-msg" id="val-${slide.id}">Please share your thoughts to continue.</div>`;
        }
        inner += `<div class="nav-row">
          <button class="btn btn-primary" onclick="Survey.next()">OK &check;</button>
          <p class="hint">or press <kbd>Ctrl</kbd>+<kbd>Enter</kbd></p>
        </div>`;

      } else if (slide.type === 'text-short') {
        const val = answers[slide.field] || '';
        inner += `<input type="text" class="text-input name-input" data-field="${slide.field}" placeholder="${slide.placeholder || ''}" value="${val}" oninput="Survey.textInput(this)" onkeydown="if(event.key==='Enter')Survey.next()">`;
        inner += `<div class="nav-row">
          <button class="btn btn-primary" onclick="Survey.next()">OK &check;</button>
          <p class="hint">or press <kbd>Enter</kbd></p>
        </div>`;

      } else if (slide.type === 'rating') {
        inner += '<div class="rating-grid">';
        for (let i = slide.min; i <= slide.max; i++) {
          const selected = answers[slide.field] === i ? ' selected' : '';
          inner += `<button class="rating-btn${selected}" data-field="${slide.field}" data-value="${i}" onclick="Survey.selectRating(this)">${i}</button>`;
        }
        inner += '</div>';
        inner += '<div class="rating-labels"><span>Very poor</span><span>Excellent</span></div>';
        inner += `<div class="validation-msg" id="val-${slide.id}">Please select a rating.</div>`;
      }

      inner += '</div>';
    }

    inner += '</div>';
    el.innerHTML = inner;
    return el;
  }

  function renderAll() {
    const viewport = document.getElementById('slidesViewport');
    viewport.innerHTML = '';
    slides.forEach((slide, i) => {
      viewport.appendChild(renderSlide(slide, i));
    });
    updateProgress();
  }

  function updateProgress() {
    const total = slides.length - 1;
    const pct = Math.min(100, Math.round((currentSlide / total) * 100));
    document.getElementById('progressFill').style.width = pct + '%';
    const current = slides[currentSlide];
    if (current.type === 'welcome') {
      document.getElementById('progressText').textContent = '';
    } else if (current.type === 'thankyou') {
      document.getElementById('progressText').textContent = 'Complete!';
    } else {
      document.getElementById('progressText').textContent = `${currentSlide} of ${total}`;
    }
  }

  function goTo(newIndex) {
    if (isTransitioning || newIndex < 0 || newIndex >= slides.length) return;
    isTransitioning = true;

    const allSlides = document.querySelectorAll('.slide');
    const oldEl = allSlides[currentSlide];
    const direction = newIndex > currentSlide ? 'exit-up' : '';

    if (oldEl) {
      oldEl.classList.remove('active');
      if (direction) oldEl.classList.add(direction);
    }

    currentSlide = newIndex;
    slides = getSlides();

    const viewport = document.getElementById('slidesViewport');
    viewport.innerHTML = '';
    slides.forEach((slide, i) => {
      const el = renderSlide(slide, i);
      if (i === currentSlide) {
        el.classList.remove('active');
        viewport.appendChild(el);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { el.classList.add('active'); });
        });
      } else {
        viewport.appendChild(el);
      }
    });

    updateProgress();
    setTimeout(() => { isTransitioning = false; }, 500);

    const activeInput = document.querySelector('.slide.active textarea, .slide.active input[type="text"]');
    if (activeInput) setTimeout(() => activeInput.focus(), 500);
  }

  function validate(slide) {
    if (!slide.required) return true;
    if (slide.type === 'single-select' || slide.type === 'rating') {
      return answers[slide.field] !== undefined;
    }
    if (slide.type === 'multi-select') {
      return (answers[slide.field] || []).length > 0;
    }
    if (slide.type === 'textarea') {
      return (answers[slide.field] || '').trim().length > 0;
    }
    return true;
  }

  function showValidation(slideId) {
    const el = document.getElementById('val-' + slideId);
    if (el) el.classList.add('show');
    setTimeout(() => { if (el) el.classList.remove('show'); }, 3000);
  }

  function submitSurvey() {
    const payload = {
      respondentName: answers.respondentName || '',
      didUseGemini: answers.didUseGemini || '',
      branch: branch,
      usageFrequency: answers.usageFrequency || '',
      featuresUsed: (answers.featuresUsed || []).join('; '),
      workTasks: answers.workTasks || '',
      whatLiked: answers.whatLiked || '',
      whatDisliked: answers.whatDisliked || '',
      overallRating: answers.overallRating || null,
      continueUsing: answers.continueUsing || '',
      reasonsNotUsed: (answers.reasonsNotUsed || []).join('; '),
      whatWouldHelp: answers.whatWouldHelp || '',
      openToTrying: answers.openToTrying || '',
      additionalThoughts: answers.additionalThoughts || '',
      submittedAt: new Date().toISOString(),
    };

    fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    .then(r => {
      if (!r.ok) throw new Error('API response ' + r.status);
    })
    .catch(err => {
      console.warn('[Survey] Submission failed:', err);
    });
  }

  window.Survey = {
    selectSingle(btn) {
      const field = btn.dataset.field;
      const value = btn.dataset.value;
      answers[field] = value;

      btn.closest('.option-grid').querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      if (field === 'didUseGemini') {
        branch = value === 'yes' ? 'user' : 'nonuser';
      }

      setTimeout(() => this.next(), 350);
    },

    toggleMulti(btn) {
      const field = btn.dataset.field;
      const value = btn.dataset.value;
      if (!answers[field]) answers[field] = [];

      const idx = answers[field].indexOf(value);
      if (idx > -1) {
        answers[field].splice(idx, 1);
        btn.classList.remove('selected');
      } else {
        answers[field].push(value);
        btn.classList.add('selected');
      }
    },

    selectRating(btn) {
      const field = btn.dataset.field;
      const value = parseInt(btn.dataset.value);
      answers[field] = value;

      btn.closest('.rating-grid').querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      setTimeout(() => this.next(), 350);
    },

    textInput(el) {
      answers[el.dataset.field] = el.value;
    },

    next() {
      const slide = slides[currentSlide];

      if (slide.type !== 'welcome' && slide.type !== 'thankyou') {
        if (!validate(slide)) {
          showValidation(slide.id);
          return;
        }
      }

      const nextIndex = currentSlide + 1;
      if (nextIndex >= slides.length) return;

      if (slides[nextIndex].type === 'thankyou') {
        submitSurvey();
      }

      goTo(nextIndex);
    },

    prev() {
      if (currentSlide > 0) goTo(currentSlide - 1);
    },
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) {
      Survey.next();
    }
  });

  renderAll();
})();
</script>
</body>
</html>
